name: Sign In — Invalid Credentials
description: >
  Validates that the system rejects login with incorrect credentials and shows
  an appropriate error message (flujo de excepción).
tags:
  - petstore
  - signin
  - error-handling
  - high
app_config: b76ece5b-940d-4d4e-ac79-6cccfce2106e
variables:
  username: wrong_user
  password: wrong_pass
steps:
  - action: goto
    url: https://petstore.octoperf.com/actions/Account.action?signonForm=
  - action: fill
    target: username input field on the login form
    value: $username
  - action: fill
    target: password input field on the login form
    value: $password
  - action: click
    target: Login button
  - action: to_be_visible
    target: Invalid username or password error message
